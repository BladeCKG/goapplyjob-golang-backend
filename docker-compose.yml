services:
  migrate:
    build:
      context: .
    image: goapplyjob-backend
    env_file:
      - .env
    command: ["/app/migrate"]
    restart: "no"
    volumes:
      - ./page_extract.db:/app/page_extract.db
      - ./logs:/app/logs
      - ./watcher_output:/app/watcher_output
      - ./watcher_state.json:/app/watcher_state.json

  api:
    build:
      context: .
    image: goapplyjob-backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./page_extract.db:/app/page_extract.db
      - ./logs:/app/logs
      - ./watcher_output:/app/watcher_output
      - ./watcher_state.json:/app/watcher_state.json

  watcher:
    build:
      context: .
    image: goapplyjob-backend
    profiles:
      - workers
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: unless-stopped
    command: ["/app/api"]
    volumes:
      - ./page_extract.db:/app/page_extract.db
      - ./logs:/app/logs
      - ./watcher_output:/app/watcher_output
      - ./watcher_state.json:/app/watcher_state.json

  importer:
    build:
      context: .
    image: goapplyjob-backend
    profiles:
      - workers
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: unless-stopped
    command: ["/app/api"]
    volumes:
      - ./page_extract.db:/app/page_extract.db
      - ./logs:/app/logs
      - ./watcher_output:/app/watcher_output
      - ./watcher_state.json:/app/watcher_state.json
