version: 2.1

orbs:
  go: circleci/go@1.11.0

jobs:
  backend-workers-hourly:
    docker:
      - image: cimg/go:1.24
    resource_class: medium
    environment:
      LOG_LEVEL: INFO
      SQL_ECHO: "false"
      # DATABASE_URL: set in CircleCI Project Settings / Context
      # GROQ_API_KEY: set in CircleCI Project Settings / Context
      # ENABLED_SOURCES: set in CircleCI Project Settings / Context
    steps:
      - checkout
      - run:
          name: Validate required env vars
          command: |
            set -e
            missing=0
            for key in DATABASE_URL GROQ_API_KEY RAW_JOB_RETENTION_DAYS ENABLED_SOURCES; do
              if [ -z "${!key}" ]; then
                echo "Missing required env var: $key"
                missing=1
              fi
            done
            if [ "$missing" -ne 0 ]; then
              exit 1
            fi
      - run:
          name: Install dependencies
          command: go mod download
      - run:
          name: Run database migrations
          command: go run ./cmd/migrate
      - run:
          name: Run hourly watcher
          environment:
            WATCH_RUN_ONCE: "true"
          command: go run ./cmd/watcher
      - run:
          name: Run hourly import worker
          environment:
            RAW_IMPORT_RUN_ONCE: "true"
            RAW_IMPORT_BATCH_SIZE: "1000"
            RAW_IMPORT_PAYLOADS_PER_CYCLE: "40"
          command: go run ./cmd/importer
      - run:
          name: Run hourly raw worker
          environment:
            RAW_JOB_WORKER_BATCH_SIZE: "100"
            # RAW_JOB_RETENTION_DAYS: set in CircleCI Project Settings / Context
          command: go run ./cmd/skippablerecheck
      - run:
          name: Run hourly parsed worker
          environment:
            PARSED_JOB_RUN_ONCE: "true"
            PARSED_JOB_WORKER_BATCH_SIZE: "100"
          command: go run ./cmd/parsedfreshness

workflows:
  backend-workers:
    jobs:
      - backend-workers-hourly:
          context: goapplyjob-backend
