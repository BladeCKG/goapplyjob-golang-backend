name: Backend Workers Cron

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-workers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ENABLED_SOURCES: ${{ vars.ENABLED_SOURCES || 'remoterocketship' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run database migrations
        run: go run ./cmd/migrate

      - name: Run hourly watcher
        env:
          WATCH_RUN_ONCE: "true"
        run: go run ./cmd/watcher

      - name: Run hourly import worker
        env:
          RAW_IMPORT_RUN_ONCE: "true"
          RAW_IMPORT_BATCH_SIZE: "1000"
          RAW_IMPORT_PAYLOADS_PER_CYCLE: "40"
        run: go run ./cmd/importer

      - name: Run hourly raw worker
        env:
          RAW_JOB_RETENTION_DAYS: ${{ secrets.RAW_JOB_RETENTION_DAYS }}
          RAW_JOB_WORKER_BATCH_SIZE: "100"
          RAW_JOB_HTTP_429_RETRY_DELAY_SECONDS: "10"
        run: go run ./cmd/skippablerecheck

      - name: Run hourly parsed worker
        env:
          PARSED_JOB_RUN_ONCE: "true"
          PARSED_JOB_WORKER_BATCH_SIZE: "100"
        run: go run ./cmd/parsedfreshness
