name: Backend Workers Cron

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

jobs:
  run-workers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ENABLED_SOURCES: ${{ vars.ENABLED_SOURCES || 'remoterocketship' }}
      WORKERS_SERVICE_URL: ${{ vars.WORKERS_SERVICE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Probe workers service
        id: workers_service
        shell: bash
        run: |
          if [ -z "${WORKERS_SERVICE_URL}" ]; then
            echo "No WORKERS_SERVICE_URL configured. Falling back to cron workers."
            echo "run_workers=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if curl --fail --silent --show-error --max-time 10 "${WORKERS_SERVICE_URL}" > /dev/null; then
            echo "Workers service responded successfully. Skipping cron worker execution."
            echo "run_workers=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Workers service probe failed. Running cron workers."
          echo "run_workers=true" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        if: steps.workers_service.outputs.run_workers == 'true'
        run: go run ./cmd/migrate

      - name: Run hourly watcher
        if: steps.workers_service.outputs.run_workers == 'true'
        env:
          WATCH_RUN_ONCE: "true"
        run: go run ./cmd/watcher

      - name: Run hourly import worker
        if: steps.workers_service.outputs.run_workers == 'true'
        env:
          RAW_IMPORT_RUN_ONCE: "true"
          RAW_IMPORT_BATCH_SIZE: "1000"
          RAW_IMPORT_PAYLOADS_PER_CYCLE: "40"
        run: go run ./cmd/importer

      - name: Run hourly raw worker
        if: steps.workers_service.outputs.run_workers == 'true'
        env:
          RAW_JOB_RUN_ONCE: "true"
          RAW_JOB_RETENTION_DAYS: ${{ secrets.RAW_JOB_RETENTION_DAYS }}
          RAW_JOB_WORKER_BATCH_SIZE: "100"
          RAW_JOB_HTTP_429_RETRY_DELAY_SECONDS: "10"
        run: go run ./cmd/rawjobworker

      - name: Run hourly parsed worker
        if: steps.workers_service.outputs.run_workers == 'true'
        env:
          PARSED_JOB_RUN_ONCE: "true"
          PARSED_JOB_WORKER_BATCH_SIZE: "100"
        run: go run ./cmd/parsedjobworker
