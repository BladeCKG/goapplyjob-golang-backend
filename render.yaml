databases:
  - name: goapplyjob-backend-db
    databaseName: goapplyjob_backend
    user: goapplyjob_backend
    plan: starter

services:
  - type: web
    name: goapplyjob-backend-api
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: /bin/sh -lc "/app/migrate && /app/api"
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goapplyjob-backend-db
          property: connectionString
      - key: WATCH_ENABLED
        value: "true"
      - key: AUTH_DEBUG_RETURN_CODE
        value: "false"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: CRYPTO_PAYMENT_PROVIDER
        value: oxapay
      - key: ENABLED_SOURCES
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_TLS
        value: "true"
      - key: AUTH_MAGIC_LINK_BASE_URL
        sync: false
      - key: PAYMENT_SUCCESS_URL
        sync: false
      - key: PAYMENT_CANCEL_URL
        sync: false
      - key: OXAPAY_API_BASE_URL
        value: https://api.oxapay.com/v1
      - key: OXAPAY_MERCHANT_API_KEY
        sync: false
      - key: CRYPTO_IPN_CALLBACK_URL
        sync: false

  - type: worker
    name: goapplyjob-worker-url-watcher
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/watcher
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goapplyjob-backend-db
          property: connectionString
      - key: WATCH_ENABLED
        value: "true"
      - key: ENABLED_SOURCES
        sync: false
      - key: WATCH_INTERVAL_MINUTES
        value: "1"
      - key: WATCH_SAMPLE_KB
        value: "8"
      - key: WATCH_TIMEOUT_SECONDS
        value: "30"
      - key: WATCH_RUN_ONCE
        value: "false"
      - key: CRYPTO_PAYMENT_PROVIDER
        value: oxapay
      - key: OXAPAY_MERCHANT_API_KEY
        sync: false

  - type: worker
    name: goapplyjob-worker-import-jobs
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/importer
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goapplyjob-backend-db
          property: connectionString
      - key: RAW_IMPORT_INTERVAL_MINUTES
        value: "1"
      - key: ENABLED_SOURCES
        sync: false
      - key: RAW_IMPORT_BATCH_SIZE
        value: "1000"
      - key: RAW_IMPORT_PAYLOADS_PER_CYCLE
        value: "5"
      - key: RAW_IMPORT_RUN_ONCE
        value: "false"
      - key: CRYPTO_PAYMENT_PROVIDER
        value: oxapay
      - key: OXAPAY_MERCHANT_API_KEY
        sync: false

  - type: worker
    name: goapplyjob-worker-raw-jobs
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/rawjobworker
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goapplyjob-backend-db
          property: connectionString
      - key: ENABLED_SOURCES
        sync: false
      - key: RAW_JOB_WORKER_BATCH_SIZE
        value: "320"
      - key: RAW_JOB_WORKER_POLL_SECONDS
        value: "5"
      - key: RAW_JOB_HTTP_429_RETRIES
        value: "3"
      - key: RAW_JOB_HTTP_429_RETRY_DELAY_SECONDS
        value: "10"
      - key: RAW_JOB_RUN_ONCE
        value: "false"
      - key: CRYPTO_PAYMENT_PROVIDER
        value: oxapay
      - key: OXAPAY_MERCHANT_API_KEY
        sync: false

  - type: worker
    name: goapplyjob-worker-parsed-jobs
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/parsedjobworker
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goapplyjob-backend-db
          property: connectionString
      - key: PARSED_JOB_WORKER_BATCH_SIZE
        value: "260"
      - key: PARSED_JOB_WORKER_POLL_SECONDS
        value: "5"
      - key: PARSED_JOB_RUN_ONCE
        value: "false"
      - key: CRYPTO_PAYMENT_PROVIDER
        value: oxapay
      - key: OXAPAY_MERCHANT_API_KEY
        sync: false
